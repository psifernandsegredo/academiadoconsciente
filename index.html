<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia do Consciente — Em breve</title>
<meta name="description" content="Em breve, novidades. Enquanto isso, siga nas redes sociais.">
<meta property="og:title" content="Academia do Consciente">
<meta property="og:description" content="Em breve, novidades.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700;1,900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  :root {
    --lilas: #9D7EB8;
    --lilas-escuro: #7A5E94;
    --rosa: #F8C8D8;
    --pessego: #F4B89A;
    --lilas-claro: #C9A8D9;
    --creme: #F5F1EA;
    --grafite: #3A3A3A;
    --cinza: #77787B;
    --branco: #FFFFFF;
  }
  
  html, body {
    height: 100%;
    overflow: hidden;
  }
  
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #F8C8D8 0%, #C9A8D9 50%, #F4B89A 100%);
    background-attachment: fixed;
    color: var(--branco);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 60px 24px;
    position: relative;
    overflow-y: auto;
  }
  
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  
  body {
    background-size: 200% 200%;
    animation: shimmer 20s ease-in-out infinite;
  }
  
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    max-width: 600px;
    width: 100%;
    animation: fadeIn 1.2s ease-out;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .symbol {
    margin-bottom: 50px;
    animation: float 6s ease-in-out infinite;
  }
  
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  
  .symbol svg {
    width: 100px;
    height: 100px;
  }
  
  .logo {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 900;
    font-size: clamp(38px, 7vw, 64px);
    line-height: 0.95;
    margin-bottom: 60px;
    color: var(--branco);
  }
  
  .logo-dot {
    color: var(--branco);
  }
  
  .message {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(20px, 3.5vw, 28px);
    line-height: 1.4;
    margin-bottom: 16px;
    max-width: 500px;
    color: var(--branco);
  }
  
  .submessage {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(14px, 2vw, 16px);
    line-height: 1.6;
    opacity: 0.9;
    margin-bottom: 50px;
    max-width: 420px;
    letter-spacing: 0.5px;
  }
  
  .divider {
    width: 60px;
    height: 1px;
    background: var(--branco);
    opacity: 0.6;
    margin: 0 auto 40px;
  }
  
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 16px 36px;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 100px;
    color: var(--branco);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  
  .cta:hover {
    background: rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 0.6);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
  }
  
  .cta:active {
    transform: translateY(0);
  }
  
  .cta-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  
  .footer {
    width: 100%;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
    color: var(--branco);
    padding-top: 40px;
  }
  
  .footer-line {
    width: 30px;
    height: 1px;
    background: var(--branco);
    opacity: 0.5;
    margin: 0 auto 20px;
  }
  
  .footer-credit {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: none;
    opacity: 0.85;
    margin-bottom: 6px;
  }
  
  .footer-meta {
    font-size: 9px;
    letter-spacing: 3px;
    opacity: 0.6;
  }
  
  @media (max-width: 600px) {
    body { padding: 40px 20px; }
    .symbol svg { width: 80px; height: 80px; }
    .symbol { margin-bottom: 36px; }
    .logo { margin-bottom: 40px; }
    .message { margin-bottom: 12px; }
    .submessage { margin-bottom: 36px; }
    .cta { padding: 14px 28px; font-size: 12px; }
  }
</style>
</head>
<body>

  <div class="content">
    
    <div class="symbol">
      <svg viewBox="-300 -300 600 600" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(-90, 0)">
          <circle cx="0" cy="0" r="48" fill="#FFFFFF"/>
          <line x1="0" y1="-280" x2="0" y2="-115" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>
          <line x1="280" y1="0" x2="115" y2="0" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>
          <line x1="0" y1="280" x2="0" y2="115" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>
          <line x1="140" y1="-242.5" x2="57.5" y2="-99.6" stroke="#FFFFFF" stroke-width="18.7" stroke-linecap="round"/>
          <line x1="242.5" y1="-140" x2="99.6" y2="-57.5" stroke="#FFFFFF" stroke-width="18.7" stroke-linecap="round"/>
          <line x1="242.5" y1="140" x2="99.6" y2="57.5" stroke="#FFFFFF" stroke-width="18.7" stroke-linecap="round"/>
          <line x1="140" y1="242.5" x2="57.5" y2="99.6" stroke="#FFFFFF" stroke-width="18.7" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    
    <h1 class="logo">
      academia<br>
      do consciente<span class="logo-dot">.</span>
    </h1>
    
    <p class="message">Em breve, novidades.</p>
    <p class="submessage">Enquanto isso, siga nas redes sociais.</p>
    
    <div class="divider"></div>
    
    <a href="https://www.instagram.com/academiadoconsciente/" target="_blank" rel="noopener noreferrer" class="cta" aria-label="Seguir Academia do Consciente no Instagram">
      <svg class="cta-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      @academiadoconsciente
    </a>
    
  </div>
  
  <footer class="footer">
    <div class="footer-line"></div>
    <p class="footer-credit">Fernando Segredo</p>
    <p class="footer-meta">2026</p>
  </footer>

</body>
</html>
